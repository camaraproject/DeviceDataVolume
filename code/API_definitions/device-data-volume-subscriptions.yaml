    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 0.2.0-rc.1
  x-camara-commonalities: 0.8.0
servers:
  - url: '{apiRoot}/device-data-volume-subscriptions/v0.2rc1'
    variables:
      apiRoot:
        default: http://localhost:9091
        description: API root, defined by the service provider, e.g. `api.example.com` or `api.example.com/somepath`
tags:
  - name: Device Data Volume Subscriptions
    description: Manage subscriptions to device data volume usage events.
externalDocs:
  description: Project documentation at CAMARA
  url: https://github.com/camaraproject/DeviceDataVolume
paths:
  /subscriptions:
    post:
      tags:
        - Device Data Volume Subscriptions
      summary: Create a device data volume event subscription
      description: Create a subscription for data volume usage events
      operationId: createDeviceDataVolumeSubscription
      parameters:
        - $ref: '#/components/parameters/x-correlator'
      security:
        - openId:
            - device-data-volume-subscriptions:org.camaraproject.device-data-volume-subscriptions.v0.data-50-percent:create
            - device-data-volume-subscriptions:org.camaraproject.device-data-volume-subscriptions.v0.data-75-percent:create
            - device-data-volume-subscriptions:org.camaraproject.device-data-volume-subscriptions.v0.data-90-percent:create
            - device-data-volume-subscriptions:org.camaraproject.device-data-volume-subscriptions.v0.data-exceeded:create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionRequest'
        required: true
      callbacks:
        notifications:
          '{$request.body#/sink}':
            post:
              summary: notifications callback
              description: |
                Important: this endpoint is to be implemented by the API consumer.
                The Data Volume server will call this endpoint whenever a data volume usage event occurs.
              operationId: postNotification
              parameters:
                - $ref: '#/components/parameters/x-correlator'
              requestBody:
                required: true
                content:
                  application/cloudevents+json:
                    schema:
                      $ref: '#/components/schemas/NotificationEvent'
                    examples:
                      data-50-percent:
                        $ref: '#/components/examples/DATA_50_PERCENT'
                      data-75-percent:
                        $ref: '#/components/examples/DATA_75_PERCENT'
                      data-90-percent:
                        $ref: '#/components/examples/DATA_90_PERCENT'
                      data-exceeded:
                        $ref: '#/components/examples/DATA_EXCEEDED'
                      subscription-started:
                        $ref: '#/components/examples/SUBSCRIPTION_STARTED'
                      subscription-updated:
                        $ref: '#/components/examples/SUBSCRIPTION_UPDATED'
                      subscription-ended:
                        $ref: '#/components/examples/SUBSCRIPTION_ENDED'
              responses:
                '204':
                  description: Successful notification
                  headers:
                    x-correlator:
                      $ref: '#/components/headers/x-correlator'
                '400':
                  $ref: '#/components/responses/Generic400'
                '401':
                  $ref: '#/components/responses/Generic401'
                '403':
                  $ref: '#/components/responses/Generic403'
                '410':
                  $ref: '#/components/responses/Generic410'
                '429':
                  $ref: '#/components/responses/Generic429'
              security:
                - {}
                - notificationsBearerAuth: []
      responses:
        '201':
          description: Created
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
              examples:
                Successful Subscription Creation:
                  $ref: '#/components/examples/SUBSCRIPTION_CREATION'
                Successful Subscription Creation With Device Disambiguation:
                  $ref: '#/components/examples/SUBSCRIPTION_CREATION_WITH_DEVICE_DISAMBIGUATION'
        '202':
          description: Request accepted to be processed. It applies for async creation process.
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionAsync'
        '400':
          $ref: '#/components/responses/CreateSubscriptionBadRequest400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/SubscriptionPermissionDenied403'
        '409':
          $ref: '#/components/responses/Generic409'
        '422':
          $ref: '#/components/responses/CreateSubscriptionUnprocessableEntity422'
        '429':
          $ref: '#/components/responses/Generic429'
    get:
      tags:
        - Device Data Volume Subscriptions
      summary: Retrieve a list of device data volume subscriptions
      description: Retrieve a list of data volume usage event subscription(s)
      operationId: retrieveDeviceDataVolumeSubscriptionList
      parameters:
        - $ref: '#/components/parameters/x-correlator'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/perPage'
      security:
        - openId:
            - device-data-volume-subscriptions:read
      responses:
        '200':
          description: List of event subscription details
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
            X-Total-Count:
              $ref: '#/components/headers/x-total-count'
            X-Total-Pages:
              $ref: '#/components/headers/x-total-pages'
            Link:
              $ref: '#/components/headers/link'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionList'
              examples:
                Subscription List:
                  $ref: '#/components/examples/SUBSCRIPTION_LIST'
                Empty Subscription List:
                  $ref: '#/components/examples/EMPTY_SUBSCRIPTION_LIST'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
  /subscriptions/{subscriptionId}:
    get:
      tags:
        - Device Data Volume Subscriptions
      summary: Retrieve a device data volume event subscription
      description: Retrieve a specific subscription by ID
      operationId: retrieveDeviceDataVolumeSubscription
      security:
        - openId:
            - device-data-volume-subscriptions:read
      parameters:
        - $ref: '#/components/parameters/SubscriptionId'
        - $ref: '#/components/parameters/x-correlator'
      responses:
        '200':
          description: OK
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
              examples:
                Active Subscription:
                  $ref: '#/components/examples/ACTIVE_SUBSCRIPTION'
                Active Subscription With Device Disambiguation:
                  $ref: '#/components/examples/ACTIVE_SUBSCRIPTION_WITH_DEVICE_DISAMBIGUATION'
        '400':
          $ref: '#/components/responses/SubscriptionIdRequired400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
    delete:
      tags:
        - Device Data Volume Subscriptions
      summary: Delete a device data volume event subscription
      operationId: deleteDeviceDataVolumeSubscription
      description: |
        This operation deletes a specific data volume usage subscription by its subscription ID.
        Once deleted, no more notifications will be sent for the corresponding subscription.
      security:
        - openId:
            - device-data-volume-subscriptions:delete
      parameters:
        - $ref: '#/components/parameters/SubscriptionId'
        - $ref: '#/components/parameters/x-correlator'
      responses:
        '202':
          description: Request accepted to be processed. It applies for async deletion process.
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionAsync'
        '204':
          description: No Content - Subscription successfully deleted
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
        '400':
          $ref: '#/components/responses/SubscriptionIdRequired400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
components:
  securitySchemes:
    openId:
      type: openIdConnect
      openIdConnectUrl: https://example.com/.well-known/openid-configuration
      description: OpenID Connect authentication via discovery metadata.
    notificationsBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: '{$request.body#/sinkCredential.credentialType}'
      description: |
        Bearer token for notification delivery. Token format is determined
        by `sinkCredential.credentialType` in the subscription request.
  parameters:
    SubscriptionId:
      name: subscriptionId
      in: path
      description: Subscription identifier that was obtained from the create event subscription operation
      required: true
      schema:
        $ref: '#/components/schemas/SubscriptionId'
    x-correlator:
      name: x-correlator
      in: header
      description: Correlation id for the different services
      schema:
        $ref: '#/components/schemas/XCorrelator'
    page:
      name: page
      in: query
      description: |
        Requested page number. Pages are 1-indexed. Values below 1 are rejected with `400 INVALID_ARGUMENT`.
      required: false
      schema:
        $ref: '#/components/schemas/Page'
    perPage:
      name: perPage
      in: query
      description: |
        Number of subscriptions to return per page. Values outside the allowed range are rejected with `400 INVALID_ARGUMENT`.
      required: false
      schema:
        $ref: '#/components/schemas/PerPage'
  schemas:
    SubscriptionDetail:
      description: The details of the requested device data volume subscription.
      type: object
      properties:
        device:
          $ref: '#/components/schemas/Device'
    Config:
      description: Config schema allowing for device to be specified as part of subscription detail
      allOf:
        - $ref: '#/components/schemas/Config-2'
        - type: object
          properties:
            subscriptionDetail:
              $ref: '#/components/schemas/SubscriptionDetail'
    ApiEventType:
      type: string
      description: |
        Event types that can be triggered for device data volume monitoring.
      enum:
        - org.camaraproject.device-data-volume-subscriptions.v0.data-50-percent
        - org.camaraproject.device-data-volume-subscriptions.v0.data-75-percent
        - org.camaraproject.device-data-volume-subscriptions.v0.data-90-percent
        - org.camaraproject.device-data-volume-subscriptions.v0.data-exceeded
    ApiNotificationEvent:
      description: |
        API-specific notification event group.
        Extends the CloudEvent envelope and constrains `type` to the set of
        event types defined by this API project.
        Adding a new event type only requires updating ApiEventType and the
        discriminator mapping below — the CloudEvent base never changes.
      allOf:
        - $ref: '#/components/schemas/CloudEvent'
        - type: object
          properties:
            type:
              $ref: '#/components/schemas/ApiEventType'
      discriminator:
        propertyName: type
        mapping:
          org.camaraproject.device-data-volume-subscriptions.v0.data-50-percent: '#/components/schemas/EventDataUsage50Percent'
          org.camaraproject.device-data-volume-subscriptions.v0.data-75-percent: '#/components/schemas/EventDataUsage75Percent'
          org.camaraproject.device-data-volume-subscriptions.v0.data-90-percent: '#/components/schemas/EventDataUsage90Percent'
          org.camaraproject.device-data-volume-subscriptions.v0.data-exceeded: '#/components/schemas/EventDataUsageExceeded'
    NotificationEvent:
      description: |
        Union of all valid notification event groups at the callback endpoint.
        This schema owns no discriminator — routing within each group is
        handled by ApiNotificationEvent and SubscriptionLifecycleEvent
        respectively. Its only responsibility is to enumerate which groups
        are valid payloads for this API's notification callback.
      oneOf:
        - $ref: '#/components/schemas/ApiNotificationEvent'
        - $ref: '#/components/schemas/SubscriptionLifecycleEvent'
    Subscription:
      description: Represents a device data volume subscription.
      type: object
      required:
        - sink
        - protocol
        - config
        - types
        - id
        - startsAt
      properties:
        protocol:
          $ref: '#/components/schemas/Protocol'
        sink:
          $ref: '#/components/schemas/Sink'
        types:
          description: |
            Camara Event types eligible to be delivered by this subscription for device data volume.
            Note: As of now we enforce to have only event type per subscription.
          type: array
          minItems: 1
          maxItems: 1
          items:
            $ref: '#/components/schemas/ApiEventType'
        config:
          $ref: '#/components/schemas/Config'
        id:
          $ref: '#/components/schemas/SubscriptionId'
        startsAt:
          $ref: '#/components/schemas/DateTime'
        expiresAt:
          $ref: '#/components/schemas/DateTime'
        status:
          type: string
          description: |-
            Current status of the subscription - Management of Subscription State engine is not mandatory for now. Note not all statuses may be considered to be implemented. Details:
              - `ACTIVATION_REQUESTED`: Subscription creation (POST) is triggered but subscription creation process is not finished yet.
              - `ACTIVE`: Subscription creation process is completed. Subscription is fully operative.
              - `INACTIVE`: Subscription is temporarily inactive, but its workflow logic is not deleted.
              - `EXPIRED`: Subscription is ended (no longer active). This status applies when subscription is ended due to `SUBSCRIPTION_EXPIRED` or `ACCESS_TOKEN_EXPIRED` event.
              - `DELETED`: Subscription is ended as deleted (no longer active). This status applies when subscription information is kept (i.e. subscription workflow is no longer active but its meta-information is kept).
          enum:
            - ACTIVATION_REQUESTED
            - ACTIVE
            - EXPIRED
            - INACTIVE
            - DELETED
      discriminator:
        propertyName: protocol
        mapping:
          HTTP: '#/components/schemas/HTTPSubscriptionResponse'
    SubscriptionRequest:
      description: The request for creating a event-type event subscription
      type: object
      required:
        - sink
        - protocol
        - config
        - types
      properties:
        protocol:
          $ref: '#/components/schemas/Protocol'
        sink:
          $ref: '#/components/schemas/Sink'
        sinkCredential:
          $ref: '#/components/schemas/SinkCredential'
        types:
          description: |
            Camara Event types eligible to be delivered by this subscription.
            Note: As of now we enforce to have only event type per subscription.
          type: array
          minItems: 1
          maxItems: 1
          items:
            $ref: '#/components/schemas/ApiEventType'
        config:
          $ref: '#/components/schemas/Config'
      discriminator:
        propertyName: protocol
        mapping:
          HTTP: '#/components/schemas/HTTPSubscriptionRequest'
    SubscriptionAsync:
      description: Response for a event-type subscription request managed asynchronously (Creation or Deletion)
      type: object
      required:
        - id
      properties:
        id:
          $ref: '#/components/schemas/SubscriptionId'
    SubscriptionList:
      description: Response with subscriptions list
      type: object
      required:
        - subscriptions
        - pagination
      properties:
        subscriptions:
          description: Subscriptions list
          type: array
          minItems: 0
          maxItems: 100
          items:
            $ref: '#/components/schemas/Subscription'
        pagination:
          $ref: '#/components/schemas/Pagination'
    SubscriptionLifecycleEvent:
      description: |
        Subscription lifecycle event group, common to all CAMARA APIs that
        support explicit subscriptions.
        Extends the CloudEvent envelope and constrains `type` to the set of
        lifecycle event types managed by Commonalities.
      allOf:
        - $ref: '#/components/schemas/CloudEvent'
        - type: object
          properties:
            type:
              $ref: '#/components/schemas/SubscriptionLifecycleEventType'
      discriminator:
        propertyName: type
        mapping:
          org.camaraproject.device-data-volume-subscriptions.v0.subscription-started: '#/components/schemas/EventSubscriptionStarted'
          org.camaraproject.device-data-volume-subscriptions.v0.subscription-updated: '#/components/schemas/EventSubscriptionUpdated'
          org.camaraproject.device-data-volume-subscriptions.v0.subscription-ended: '#/components/schemas/EventSubscriptionEnded'
    SubscriptionLifecycleEventType:
      type: string
      description: |
        Enum of subscription lifecycle event type strings.
        These are managed by Commonalities and are identical across all CAMARA
        APIs that support explicit subscriptions.
        Kept as a separate named schema so the set of valid lifecycle type
        strings can be referenced independently from the discriminated schema.
      enum:
        - org.camaraproject.device-data-volume-subscriptions.v0.subscription-started
        - org.camaraproject.device-data-volume-subscriptions.v0.subscription-updated
        - org.camaraproject.device-data-volume-subscriptions.v0.subscription-ended
    BasicDeviceEventData:
      description: Event detail structure for basic device events
      type: object
      required:
        - subscriptionId
      properties:
        device:
          $ref: '#/components/schemas/DeviceResponse'
        subscriptionId:
          $ref: '#/components/schemas/SubscriptionId'
    EventDataUsage50Percent:
      description: Event structure for data usage 50% threshold alerts
      allOf:
        - $ref: '#/components/schemas/ApiNotificationEvent'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/BasicDeviceEventData'
    EventDataUsage75Percent:
      description: Event structure for data usage 75% threshold alerts
      allOf:
        - $ref: '#/components/schemas/ApiNotificationEvent'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/BasicDeviceEventData'
    EventDataUsage90Percent:
      description: Event structure for data usage 90% threshold alerts
      allOf:
        - $ref: '#/components/schemas/ApiNotificationEvent'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/BasicDeviceEventData'
    EventDataUsageExceeded:
      description: Event structure for data usage exceeding the allocated volume
      allOf:
        - $ref: '#/components/schemas/ApiNotificationEvent'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/BasicDeviceEventData'
    EventSubscriptionStarted:
      description: Event structure for event subscription started
      allOf:
        - $ref: '#/components/schemas/SubscriptionLifecycleEvent'
        - type: object
          properties:
            data:
              allOf:
                - type: object
                  properties:
                    device:
                      $ref: '#/components/schemas/DeviceResponse'
                - $ref: '#/components/schemas/SubscriptionStarted'
    EventSubscriptionUpdated:
      description: Event structure for event subscription updated
      allOf:
        - $ref: '#/components/schemas/SubscriptionLifecycleEvent'
        - type: object
          properties:
            data:
              allOf:
                - type: object
                  properties:
                    device:
                      $ref: '#/components/schemas/DeviceResponse'
                - $ref: '#/components/schemas/SubscriptionUpdated'
    EventSubscriptionEnded:
      description: Event structure for event subscription ends
      allOf:
        - $ref: '#/components/schemas/SubscriptionLifecycleEvent'
        - type: object
          properties:
            data:
              allOf:
                - type: object
                  properties:
                    device:
                      $ref: '#/components/schemas/DeviceResponse'
                - $ref: '#/components/schemas/SubscriptionEnded'
    Sink:
      description: The address to which events shall be delivered using the selected protocol.
      type: string
      format: uri
      maxLength: 2048
      pattern: ^https:\/\/.+$
      example: https://endpoint.example.com/sink
    HTTPSubscriptionRequest:
      description: Subscription request for HTTP-based event delivery.
      allOf:
        - $ref: '#/components/schemas/SubscriptionRequest'
        - type: object
          properties:
            protocolSettings:
              $ref: '#/components/schemas/HTTPSettings'
    HTTPSubscriptionResponse:
      description: Subscription resource returned for HTTP-based event delivery.
      allOf:
        - $ref: '#/components/schemas/Subscription'
        - type: object
          properties:
            protocolSettings:
              $ref: '#/components/schemas/HTTPSettings'
    XCorrelator:
      type: string
      description: Correlator string, UUID format recommended but any string matching the pattern can be used
      pattern: ^[a-zA-Z0-9-_:;.\/<>{}]{0,256}$
      maxLength: 256
      example: b4333c46-49c0-4f62-80d7-f0ef930f1c46
    Page:
      type: integer
      format: int32
      minimum: 1
      maximum: 2147483647
      default: 1
      description: Current page number (1-indexed).
      example: 1
    PerPage:
      type: integer
      format: int32
      minimum: 1
      maximum: 100
      default: 20
      description: Number of items per page.
      example: 20
    TotalCount:
      type: integer
      format: int32
      minimum: 0
      maximum: 2147483647
      description: Total number of items matching the query, after filters applied. MAY be omitted where a full count query is prohibitively expensive.
      example: 87
    TotalPages:
      type: integer
      format: int32
      minimum: 0
      maximum: 2147483647
      description: Total number of pages. Equals ceil(totalCount / perPage). MAY be omitted where totalCount is omitted.
      example: 5
    HTTPSettings:
      type: object
      description: HTTP protocol settings for event delivery.
      properties:
        headers:
          type: object
          description: |-
            A set of key/value pairs that is copied into the HTTP request as custom headers.

            NOTE: Use/Applicability of this concept has not been discussed in Commonalities. When required by an API project as an option to meet a UC/Requirement, please generate an issue for Commonalities discussion about it.
          additionalProperties:
            type: string
            maxLength: 512
        method:
          type: string
          description: The HTTP method to use for sending the message.
          enum:
            - POST
    Protocol:
      type: string
      enum:
        - HTTP
      description: Identifier of a delivery protocol. Only HTTP is allowed for now
      example: HTTP
    CreateSubscriptionDetail:
      description: The detail of the requested event subscription.
      type: object
    Config-2:
      description: |
        Implementation-specific configuration parameters needed by the subscription manager for acquiring events.
        In CAMARA we have predefined attributes like `subscriptionExpireTime`, `subscriptionMaxEvents`, `initialEvent`
        Specific event type attributes must be defined in `subscriptionDetail`.
        Note: if a request is performed for several event types, all subscribed events will use same `config` parameters.
      type: object
      required:
        - subscriptionDetail
      properties:
        subscriptionDetail:
          $ref: '#/components/schemas/CreateSubscriptionDetail'
        subscriptionExpireTime:
          type: string
          format: date-time
          maxLength: 64
          example: '2023-01-17T13:18:23.682Z'
          description: The subscription expiration time (in date-time format) requested by the API consumer. It must follow [RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) and must have time zone. Up to API project decision to keep it.
        subscriptionMaxEvents:
          type: integer
          format: int32
          description: Identifies the maximum number of event reports to be generated (>=1) requested by the API consumer - Once this number is reached, the subscription ends. Up to API project decision to keep it.
          minimum: 1
          maximum: 1000000
          example: 5
        initialEvent:
          type: boolean
          description: |
            Set to `true` by API consumer if consumer wants to get an event as soon as the subscription is created and current situation reflects event request.
            Example: Consumer request Roaming event. If consumer sets initialEvent to true and device is in roaming situation, an event is triggered
            Up to API project decision to keep it.
    PhoneNumber:
      description: A public identifier addressing a telephone subscription. In mobile networks it corresponds to the MSISDN (Mobile Station International Subscriber Directory Number). In order to be globally unique it has to be formatted in international format, according to E.164 standard, prefixed with '+'.
      type: string
      pattern: ^\+[1-9][0-9]{4,14}$
      maxLength: 16
      example: '+123456789'
    NetworkAccessIdentifier:
      description: A public identifier addressing a subscription in a mobile network. In 3GPP terminology, it corresponds to the GPSI formatted with the External Identifier ({Local Identifier}@{Domain Identifier}). Unlike the telephone number, the network access identifier is not subjected to portability ruling in force, and is individually managed by each operator.
      type: string
      maxLength: 2048
      example: 123456789@example.com
    SingleIpv4Address:
      description: A single IPv4 address with no subnet mask
      type: string
      format: ipv4
      maxLength: 15
      example: 84.125.93.10
    Port:
      description: TCP or UDP port number
      type: integer
      format: int32
      minimum: 1
      maximum: 65535
    DeviceIpv4Address:
      type: object
      description: |
        The device should be identified by either the public (observed) IP address and port as seen by the application server, or the private (local) and any public (observed) IP addresses in use by the device (this information can be obtained by various means, for example from some DNS servers).

        If the allocated and observed IP addresses are the same (i.e. NAT is not in use) then  the same address should be specified for both publicAddress and privateAddress.

        If NAT64 is in use, the device should be identified by its publicAddress and publicPort, or separately by its allocated IPv6 address (field ipv6Address of the Device object)

        In all cases, publicAddress must be specified, along with at least one of either privateAddress or publicPort, dependent upon which is known. In general, mobile devices cannot be identified by their public IPv4 address alone.
      properties:
        publicAddress:
          $ref: '#/components/schemas/SingleIpv4Address'
        privateAddress:
          $ref: '#/components/schemas/SingleIpv4Address'
        publicPort:
          $ref: '#/components/schemas/Port'
      anyOf:
        - required:
            - publicAddress
            - privateAddress
        - required:
            - publicAddress
            - publicPort
      example:
        publicAddress: 84.125.93.10
        publicPort: 59765
    DeviceIpv6Address:
      description: |
        The device should be identified by the observed IPv6 address, or by any single IPv6 address from within the subnet allocated to the device (e.g. adding ::0 to the /64 prefix).
      type: string
      format: ipv6
      maxLength: 45
      example: 2001:db8:85a3:8d3:1319:8a2e:370:7344
    Device:
      description: |
        End-user equipment able to connect to a mobile network. Examples of devices include smartphones or IoT sensors/actuators.
            The developer can choose to provide the below specified device identifiers:
            * `ipv4Address`
            * `ipv6Address`
            * `phoneNumber`
            * `networkAccessIdentifier`
            NOTE1: the network operator might support only a subset of these options. The API Consumer can provide multiple identifiers to ensure compatibility across different network operators. In this case, the API Provider will use one of the identifiers for the API logic without performing any matching checks among the provided identifiers.
            NOTE2: as for this Commonalities release, we are enforcing that the networkAccessIdentifier is only part of the schema for future-proofing, and CAMARA does not currently allow its use. After the CAMARA meta-release work is concluded and the relevant issues are resolved, its use will need to be explicitly documented in the guidelines.
      type: object
      properties:
        phoneNumber:
          $ref: '#/components/schemas/PhoneNumber'
        networkAccessIdentifier:
          $ref: '#/components/schemas/NetworkAccessIdentifier'
        ipv4Address:
          $ref: '#/components/schemas/DeviceIpv4Address'
        ipv6Address:
          $ref: '#/components/schemas/DeviceIpv6Address'
      minProperties: 1
    SubscriptionId:
      type: string
      maxLength: 256
      description: The unique identifier of the subscription in the scope of the subscription manager. When this information is contained within an event notification, it SHALL be referred to as `subscriptionId` as per the Commonalities Event Notification Model.
      example: qs15-h556-rt89-1298
    DateTime:
      type: string
      format: date-time
      maxLength: 64
      description: Timestamp. It must follow [RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) and must have time zone.
      example: '2018-04-05T17:31:00Z'
    Pagination:
      description: Pagination details helping to navigate through paged results efficiently.
      type: object
      properties:
        page:
          $ref: '#/components/schemas/Page'
        perPage:
          $ref: '#/components/schemas/PerPage'
        totalCount:
          $ref: '#/components/schemas/TotalCount'
        totalPages:
          $ref: '#/components/schemas/TotalPages'
    ErrorInfo:
      type: object
      description: A structured error response providing details about a failed request, including the HTTP status code, an error code, and a human-readable message
      required:
        - status
        - code
        - message
      properties:
        status:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
          description: HTTP response status code
        code:
          type: string
          maxLength: 96
          description: A human-readable code to describe the error
        message:
          type: string
          maxLength: 512
          description: A human-readable description of what the event represents
    SinkCredential:
      description: A sink credential provides authentication or authorization information necessary to enable delivery of events to a target.
      type: object
      properties:
        credentialType:
          type: string
          enum:
            - ACCESSTOKEN
            - PRIVATE_KEY_JWT
          description: |
            The type of the credential - MUST be set to ACCESSTOKEN or PRIVATE_KEY_JWT for now
      discriminator:
        propertyName: credentialType
        mapping:
          ACCESSTOKEN: '#/components/schemas/AccessTokenCredential'
          PRIVATE_KEY_JWT: '#/components/schemas/PrivateKeyJWTCredential'
      required:
        - credentialType
    AccessTokenCredential:
      type: object
      description: An access token credential. This type of credential is meant to be used by API Consumers that have limited capabilities to handle authorization requests.
      allOf:
        - $ref: '#/components/schemas/SinkCredential'
        - type: object
          properties:
            accessToken:
              description: REQUIRED. An access token is a token granting access to the target resource.
              type: string
              maxLength: 4096
              writeOnly: true
            accessTokenExpiresUtc:
              type: string
              format: date-time
              maxLength: 64
              description: |
                REQUIRED. An absolute (UTC) timestamp at which the token shall be considered expired.
                In the case of an ACCESS_TOKEN_EXPIRED termination reason, implementation should notify the client before the expiration date.
                If the access token is a JWT and registered "exp" (Expiration Time) claim is present, the two expiry times should match.
                It must follow [RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) and must have time zone.
              example: '2023-07-03T12:27:08.312Z'
            accessTokenType:
              description: REQUIRED. Type of the access token (See [OAuth 2.0](https://tools.ietf.org/html/rfc6749#section-7.1)).
              type: string
              writeOnly: true
              enum:
                - bearer
          required:
            - accessToken
            - accessTokenExpiresUtc
            - accessTokenType
    PrivateKeyJWTCredential:
      type: object
      description: Use PRIVATE_KEY_JWT to get an access token. This type of credential is to be used by clients that have an authorization server.
      allOf:
        - $ref: '#/components/schemas/SinkCredential'
        - type: object
          properties:
            clientId:
              description: The client ID used to authenticate when requesting an access token using PRIVATE_KEY_JWT.
              type: string
              maxLength: 128
              writeOnly: true
            tokenUri:
              description: The URI where to request an access token using PRIVATE_KEY_JWT.
              type: string
              format: uri
              maxLength: 2048
              pattern: ^https:\/\/.+$
              writeOnly: true
            jwksUri:
              description: The URI used to request the public key to verify that the JWT assertion was signed by PRIVATE_KEY_JWT.
              type: string
              format: uri
              maxLength: 2048
              pattern: ^https:\/\/.+$
              readOnly: true
    DeviceResponse:
      description: |
        An identifier for the end-user equipment able to connect to the network that the response refers to. This parameter is only returned when the API consumer includes the `device` parameter in their request (i.e. they are using a two-legged access token), and is relevant when more than one device identifier is specified, as only one of those device identifiers is allowed in the response.

        If the API consumer provides more than one device identifier in their request, and this schema is included in the response definition, the API provider MUST use it to return a single identifier which is the one they are using to fulfil the request, even if the identifiers do not match the same device. API provider does not perform any logic to validate/correlate that the indicated device identifiers match the same device. No error should be returned if the identifiers are otherwise valid to prevent API consumers correlating different identifiers with a given end user.
      allOf:
        - $ref: '#/components/schemas/Device'
        - maxProperties: 1
    Source:
      type: string
      format: uri-reference
      minLength: 1
      maxLength: 2048
      description: |
        Identifies the context in which an event happened - be a non-empty `URI-reference` like:
        - URI with a DNS authority:
          * https://github.com/cloudevents
          * mailto:cncf-wg-serverless@lists.cncf.io
        - Universally-unique URN with a UUID:
          * urn:uuid:6e8bc430-9c3a-11d9-9669-0800200c9a66
        - Application-specific identifier:
          * /cloudevents/spec/pull/123
          * 1-555-123-4567
      example: https://notificationSendServer12.example.com
    CloudEvent:
      type: object
      description: |
        CloudEvents 1.0 specification envelope.
        This schema is the stable base for all CAMARA event notifications.
        It imposes no constraints on `type` values or `data` structure —
        those concerns belong to the API-specific and lifecycle group schemas.
      required:
        - id
        - source
        - specversion
        - type
        - time
      properties:
        id:
          type: string
          maxLength: 256
          description: Identifier of this event, unique within the source context.
        source:
          $ref: '#/components/schemas/Source'
        type:
          type: string
          maxLength: 512
          description: |
            Identifies the event type. CAMARA APIs use reverse-DNS notation:
            `org.camaraproject.<api-name>.<event-version>.<event-name>`
            The api-name segment makes each type globally unique across API groups.
        specversion:
          type: string
          description: Version of the specification to which this event conforms (must be 1.0 if it conforms to cloudevents 1.0.2 version)
          enum:
            - '1.0'
        datacontenttype:
          type: string
          description: media-type that describes the event payload encoding, must be "application/json" for CAMARA APIs
          enum:
            - application/json
        data:
          type: object
          description: Event details payload. Structure is defined by each concrete event schema.
        time:
          $ref: '#/components/schemas/DateTime'
    InitiationReason:
      type: string
      description: |
        - SUBSCRIPTION_CREATED - Subscription created by API Server
      enum:
        - SUBSCRIPTION_CREATED
    SubscriptionStarted:
      description: Event detail structure for subscription started event
      type: object
      required:
        - initiationReason
        - subscriptionId
      properties:
        initiationReason:
          $ref: '#/components/schemas/InitiationReason'
        subscriptionId:
          $ref: '#/components/schemas/SubscriptionId'
        initiationDescription:
          type: string
          maxLength: 512
          description: Description of subscription initiation
    UpdateReason:
      type: string
      description: |
        - SUBSCRIPTION_ACTIVE - API server transitioned subscription status to `ACTIVE`
        - SUBSCRIPTION_INACTIVE - API server transitioned subscription status to `INACTIVE`
      enum:
        - SUBSCRIPTION_ACTIVE
        - SUBSCRIPTION_INACTIVE
    SubscriptionUpdated:
      description: Event detail structure for subscription updated event
      type: object
      required:
        - updateReason
        - subscriptionId
      properties:
        updateReason:
          $ref: '#/components/schemas/UpdateReason'
        subscriptionId:
          $ref: '#/components/schemas/SubscriptionId'
        updateDescription:
          type: string
          maxLength: 512
          description: Description of subscription update
    TerminationReason:
      type: string
      description: |
        - NETWORK_TERMINATED - API server stopped sending notification
        - SUBSCRIPTION_EXPIRED - Subscription expire time (optionally set by the requester) has been reached
        - MAX_EVENTS_REACHED - Maximum number of events (optionally set by the requester) has been reached
        - ACCESS_TOKEN_EXPIRED - Access Token sinkCredential (optionally set by the requester with credential type `ACCESSTOKEN`) expiration time has been reached
        - SUBSCRIPTION_DELETED - Subscription was deleted by the requester
      enum:
        - MAX_EVENTS_REACHED
        - NETWORK_TERMINATED
        - SUBSCRIPTION_EXPIRED
        - ACCESS_TOKEN_EXPIRED
        - SUBSCRIPTION_DELETED
    SubscriptionEnded:
      description: Event detail structure for subscription ended event
      type: object
      required:
        - terminationReason
        - subscriptionId
      properties:
        terminationReason:
          $ref: '#/components/schemas/TerminationReason'
        subscriptionId:
          $ref: '#/components/schemas/SubscriptionId'
        terminationDescription:
          type: string
          maxLength: 512
          description: Description of subscription termination
  examples:
    DATA_50_PERCENT:
      description: Example of data-50-percent notification
      value:
        id: '124007'
        source: https://dataUsageServer.supertelco.com
        type: org.camaraproject.device-data-volume-subscriptions.v0.data-50-percent
        specversion: '1.0'
        datacontenttype: application/json
