        pagination:
          page: 1
          perPage: 1
          totalCount: 1
          totalPages: 1
    EMPTY_SUBSCRIPTION_LIST:
      description: The API consumer either has no subscriptions or, if a 3-legged access token is used, has none for the device associated with that token.
      value:
        subscriptions: []
        pagination:
          page: 1
          perPage: 1
          totalCount: 0
          totalPages: 1
  headers:
    x-correlator:
      description: Correlation id for the different services
      schema:
        $ref: '#/components/schemas/XCorrelator'
    x-total-count:
      description: Total number of items. Mirrors `pagination.totalCount` in the response body.
      required: false
      schema:
        $ref: '#/components/schemas/TotalCount'
    x-total-pages:
      description: Total number of pages. Mirrors `pagination.totalPages` in the response body.
      required: false
      schema:
        $ref: '#/components/schemas/TotalPages'
    link:
      description: |
        Navigation links for paginated results following
        [RFC 8288](https://www.rfc-editor.org/rfc/rfc8288).
        Includes only the rels applicable to the current position
        (`first`, `prev`, `next`, `last`). All original query parameters
        are preserved in Link URLs.
        Example:
          Link: <https://api.example.com/v1/resources?page=1&perPage=20>; rel="first",
                <https://api.example.com/v1/resources?page=2&perPage=20>; rel="prev",
                <https://api.example.com/v1/resources?page=4&perPage=20>; rel="next",
                <https://api.example.com/v1/resources?page=5&perPage=20>; rel="last"
      required: false
      schema:
        type: string
        maxLength: 8192
  responses:
    Generic400:
      description: Bad Request
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorInfo'
              - type: object
                properties:
                  status:
                    enum:
                      - 400
                  code:
                    enum:
                      - INVALID_ARGUMENT
                      - OUT_OF_RANGE
          examples:
            GENERIC_400_INVALID_ARGUMENT:
              description: Invalid Argument. Generic Syntax Exception
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: Client specified an invalid argument, request body or query param.
            GENERIC_400_OUT_OF_RANGE:
              description: Out of Range. Specific Syntax Exception used when a given field has a pre-defined range or a invalid filter criteria combination is requested
              value:
                status: 400
                code: OUT_OF_RANGE
                message: Client specified an invalid range.
    Generic401:
      description: Unauthorized
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorInfo'
              - type: object
                properties:
